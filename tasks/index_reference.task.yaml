name: Index Reference FASTA
description: Index a reference FASTA file using BWA and samtools to generate all required index files

agent_requirements:
  cpu_cores: 4
  memory_gb: 16

parameters:
  - name: ref_fasta
    label: Reference FASTA File
    type: file
    supports_location_mode: 'read_write'
    pattern_match:
      - "*.fasta"
      - "*.fa"
    create: false

steps:
  - name: index_reference
    description: Generate BWA index, FASTA index, and sequence dictionary for reference FASTA
    type: cmd
    docker:
      image: registry.goldenhelix.com/public/sentieon:202503.01
    args:
      - |- # shell
        set -eu pipefail

        # Source shared utility functions
        source "${TASK_DIR}/utils/utils.sh"

        workdir="/scratch"
        cd "$workdir" || { echo "Failed to change to workdir"; exit 1; }

        # Get the base name of the reference file
        ref_basename=$(basename "$ref_fasta")
        ref_dir=$(dirname "$ref_fasta")

        echo "================================================"
        echo "🔧 STARTING REFERENCE INDEXING"
        echo "================================================"
        echo "📅 Server Time: $(date)"
        echo "📁 Input File: $ref_fasta ($(format_file_size "$ref_fasta"))"
        echo "📁 Reference Directory: $ref_dir"
        echo "================================================"

        # Copy reference FASTA to workdir
        echo "Copying reference FASTA to workdir..."
        cp "$ref_fasta" "$workdir/" || { echo "Failed to copy reference FASTA"; exit 1; }
        local_ref_fasta="$workdir/$ref_basename"

        # Step 1: Generate BWA index
        echo "Step 1/3: Generating BWA index..."
        INDEX_START_TIME=$(date +%s)
        sentieon bwa index "$local_ref_fasta" || { echo "BWA indexing failed"; exit 1; }
        INDEX_END_TIME=$(date +%s)
        INDEX_DURATION=$((INDEX_END_TIME - INDEX_START_TIME))
        echo "✅ BWA indexing completed in ${INDEX_DURATION} seconds"

        # Step 2: Generate FASTA index using samtools
        echo "Step 2/3: Generating FASTA index with samtools..."
        INDEX_START_TIME=$(date +%s)
        samtools faidx "$local_ref_fasta" || { echo "samtools faidx failed"; exit 1; }
        INDEX_END_TIME=$(date +%s)
        INDEX_DURATION=$((INDEX_END_TIME - INDEX_START_TIME))
        echo "✅ FASTA indexing completed in ${INDEX_DURATION} seconds"

        # Step 3: Generate sequence dictionary using samtools
        echo "Step 3/3: Generating sequence dictionary with samtools..."
        INDEX_START_TIME=$(date +%s)
        
        # Generate dictionary file name (replace .fasta/.fa with .dict)
        if [[ "$ref_basename" == *.fasta ]]; then
          dict_name="${ref_basename%.fasta}.dict"
        elif [[ "$ref_basename" == *.fa ]]; then
          dict_name="${ref_basename%.fa}.dict"
        else
          dict_name="${ref_basename}.dict"
        fi

        samtools dict -o "$workdir/$dict_name" "$local_ref_fasta" || \
          { echo "samtools dict failed"; exit 1; }
        
        INDEX_END_TIME=$(date +%s)
        INDEX_DURATION=$((INDEX_END_TIME - INDEX_START_TIME))
        echo "✅ Sequence dictionary generation completed in ${INDEX_DURATION} seconds"

        # List all generated files
        echo ""
        echo "Generated index files:"
        ls -lh "$workdir/$ref_basename"* || true

        # Copy all generated files back to the original directory
        # Copy BWA index files (.amb, .ann, .bwt, .pac, .sa)
        echo ""
        echo "Copying generated index files back to reference directory..."
        for ext in amb ann bwt pac sa; do
          if [ -f "$workdir/$ref_basename.$ext" ]; then
            cp "$workdir/$ref_basename.$ext" "$ref_dir/" || \
              { echo "Failed to copy $ref_basename.$ext"; exit 1; }
            echo "  ✅ Copied $ref_basename.$ext"
          fi
        done

        # Copy FASTA index file (.fai)
        if [ -f "$workdir/$ref_basename.fai" ]; then
          cp "$workdir/$ref_basename.fai" "$ref_dir/" || \
            { echo "Failed to copy $ref_basename.fai"; exit 1; }
          echo "  ✅ Copied $ref_basename.fai"
        fi

        # Copy sequence dictionary file (.dict)
        if [ -f "$workdir/$dict_name" ]; then
          cp "$workdir/$dict_name" "$ref_dir/" || \
            { echo "Failed to copy $dict_name"; exit 1; }
          echo "  ✅ Copied $dict_name"
        fi

        ls "$workdir/"

        echo ""
        echo "================================================"
        echo "✅ REFERENCE INDEXING COMPLETED SUCCESSFULLY"
        echo "================================================"
        echo "📁 All index files have been copied to: $ref_dir"
        echo "💾 Remaining Disk Space: $(df -h /scratch | tail -n 1 | awk '{print $4}')"
        echo "================================================"

